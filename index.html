<!DOCTYPE html>
<html>
<head>
    <title>GreenCommute AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🌱 GreenCommute AI</h1>

    <p>
        AI-powered sustainable mobility platform that encourages
        public transport adoption through demand prediction and
        smart recommendations.
    </p>

    <label>From</label>
    <input type="text" id="from" placeholder="Enter source">

    <label>To</label>
    <input type="text" id="to" placeholder="Enter destination">

    <label>Time</label>
    <input type="time" id="time">

    <button onclick="predictDemand()">
        Predict Demand
    </button>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
